<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://use.typekit.net/bwp0bbg.css">
  
  <title>SABI</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #FAFBE3;
      --text: #211D1D;
      --border: #423A3A;
      --font-body: 'owners-text', sans-serif;
      --font-mono: 'gemeli-mono', serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--text);
    }

    img {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin: 0 auto;
      display: block;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    /* ── Ticker strip (sits above the nav) ── */
    .ticker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 36px;
      background: var(--text);
      overflow: hidden;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    /* ── Typewriter quote (replaces the old scrolling reel) ── */
    .ticker-quote-wrap {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      font-family: var(--font-mono);
      font-weight: 300;
      font-size: 13.5px;
      letter-spacing: 1.8px;
      line-height: 1;
      color: var(--bg);
    }

    .ticker-quote {
      font: inherit;
      letter-spacing: inherit;
      color: inherit;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .ticker-cursor {
      display: inline-block;
      align-self: center;
      width: 0.13em;
      height: 1.35em;
      margin-left: 3px;
      background: currentColor;
      animation: cursor-blink 0.9s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ticker-cursor { animation: none; }
    }

    /* ── Send icon, top right of the strip, links to Substack ── */
    .ticker-icon-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      margin-left: 12px;
      padding: 0;
      background: none;
      border: none;
      color: var(--bg);
      text-decoration: none;
      cursor: pointer;
    }

    .ticker-icon-btn svg {
      width: 22px;
      height: 22px;
      display: block;
      fill: var(--bg);
      shape-rendering: geometricPrecision;
    }

    .ticker-icon-btn:focus-visible {
      outline: 1px solid var(--bg);
      outline-offset: 2px;
    }

    /* ── Lightbox (blank shell — wire up Klaviyo or a form here later) ── */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(33, 29, 29, 0.75);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }

    .lightbox-overlay.is-open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-box {
      position: relative;
      width: min(480px, 88vw);
      min-height: 320px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 48px 32px 32px;
      transform: translateY(12px);
      transition: transform 0.3s ease;
    }

    .lightbox-overlay.is-open .lightbox-box {
      transform: translateY(0);
    }

    .lightbox-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 20px;
      line-height: 1;
    }

    /* Placeholder content — swap this inner markup for the Klaviyo embed */
    .lightbox-placeholder {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--border);
    }

    /* ── Top navigation ── */
    .site-nav {
      position: fixed;
      top: 36px;
      left: 0;
      display: flex;
      justify-content: space-between;
      width: calc(20vw + 96px); /* was 33.33vw — narrower container = ~0.6x the space-between gap, same on both sides by construction */
      padding: 28px 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
    }

    .nav-link {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .nav-link:visited,
    .nav-link:active,
    .nav-link:hover {
      color: var(--text);
    }

    @media (max-width: 560px) {
      .ticker { height: 36px; padding: 0 12px 0 20px; }
      .ticker-quote-wrap { font-size: 12px; letter-spacing: 1.6px; }

      .site-nav {
        top: 30px;
        width: auto;
        right: 0;
        padding: 32px 20px 20px 20px;
        gap: 20px;
      }
      .nav-link { font-size: 13px; letter-spacing: 1px; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Footer ── */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
      font-family: var(--font-body);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas: "desc weather" "contact weather";
      align-items: end;
    }

    .footer-desc { grid-area: desc; }
    .footer-row { grid-area: contact; display: contents; }
    .footer-col-left { grid-area: contact; }
    .footer-col-right { grid-area: weather; }

    .footer-col {
      display: flex;
      flex-direction: column;
    }

    .footer-col-left {
      align-items: flex-start;
      transform: scale(0.9);
      transform-origin: bottom left;
    }

    .footer-col-right {
      align-items: flex-end;
    }

    /* ── World clock / weather block ── */
    .station {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.35s ease;
      /* Small uniform nudge down to match the contact block's top/bottom —
         purely visual (transform), doesn't touch layout, alignment, or
         font-size, and applies consistently across every breakpoint since
         it's on .station itself rather than a per-breakpoint wrapper.
         Adjust this single value up/down if it needs to move further. */
      transform: translateY(3px);
    }

    .station.is-ready {
      opacity: 1;
    }

    .station-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .station-city {
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1;
      letter-spacing: 2.7px;
      text-transform: uppercase;
      color: #000000;
      font-weight: 400;
      position: relative;
      top: -0.9px;
    }

    .station-time {
      font-family: var(--font-body);
      font-size: 34.2px;
      letter-spacing: 0.9px;
      color: #000000;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .station-meta {
      display: flex;
      align-items: center;
      gap: 6.3px;
      font-family: var(--font-body);
      font-size: 27px;
      letter-spacing: 0.9px;
      color: #000000;
    }

    .station-icon {
      width: 32.4px;
      height: 32.4px;
      flex-shrink: 0;
    }
    .station-icon img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* ── Description block ── */
  .footer-desc {
  max-width: 420px;
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 400;
  line-height: 1.15;
  color: var(--text);
  text-align: left;
  margin: 0 0 14px 0;
}

/* ── Contact block ── */
.contact-block {
  display: flex;
  flex-direction: column;
  gap: 11px;
  text-align: left;
}

    .contact-label {
      font-family: var(--font-body);
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 400;
    }

    .contact-line {
      font-family: var(--font-body);
      font-size: 16.5px;
      color: #000000;
      font-weight: 300;
    }

    .contact-link {
      color: #000000 !important;
      text-decoration: underline;
    }
    .contact-link:visited,
    .contact-link:active,
    .contact-link:hover {
      color: #000000 !important;
    }

    @media (max-width: 760px) {
      img { max-width: 165px; }
      .site-footer {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: "desc desc" "contact weather";
        align-items: start;
        gap: 40px 12px;
        padding: 20px;
      }
      .footer-row { display: contents; }
      .footer-col-left {
        align-items: flex-start;
        transform: none;
        align-self: stretch;
      }
      .footer-col-right {
        align-items: flex-end;
        transform: none;
        align-self: stretch;
      }
      .contact-block {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .station {
        height: 100%;
        justify-content: space-between;
      }
      .footer-desc { text-align: center; font-size: 15px; max-width: none; margin: 0 0 4px 0; justify-self: center; }
      .contact-block { text-align: left; }
      .station-city { font-size: 15px; letter-spacing: 2px; }
      .station-time { font-size: 28px; }
      .station-meta { font-size: 22px; }
      .station-icon { width: 22px; height: 22px; }
      .station { width: auto; }
    }

    /* ── Phone landscape (short viewport): keep the compact single-row
         footer instead of the tall stacked portrait layout. Capped at
         max-height so tablets in landscape (which have plenty of room)
         keep the normal desktop-style footer untouched. ── */
    @media (orientation: landscape) and (max-height: 500px) {
      img { max-width: 110px; }

      .ticker { height: 36px; padding: 0 12px 0 20px; }
      .ticker-quote-wrap { font-size: 12px; letter-spacing: 1.6px; }

      .site-nav { top: 24px; padding: 36px 20px 14px 20px; width: 33.33vw; }

      .site-footer {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: "desc weather" "contact weather";
        align-items: end;
        gap: 0;
        padding: 14px 24px;
      }

      .footer-row { display: contents; }
      .footer-col-left {
        grid-area: contact;
        align-items: flex-start;
        transform: none;
        align-self: end;
      }
      .footer-col-right {
        grid-area: weather;
        align-items: flex-end;
        transform: none;
        align-self: end;
      }

      .footer-desc {
        text-align: left;
        font-size: 12px;
        line-height: 1.15;
        max-width: 280px;
        margin: 0 0 16px 0;
        justify-self: start;
      }

      .contact-block { gap: 4px; text-align: left; }
      .contact-label { font-size: 10px; letter-spacing: 1.5px; }
      .contact-line { font-size: 11px; }

      .station { gap: 3px; }
      .station-city { font-size: 11px; letter-spacing: 1.5px; }
      .station-time { font-size: 18px; }
      .station-meta { font-size: 14px; gap: 4px; }
      .station-icon { width: 14px; height: 14px; }
    }
  </style>

<body>
  <div class="ticker">
    <div class="ticker-quote-wrap">
      <span class="ticker-quote" id="tickerQuote" aria-live="polite"></span><span class="ticker-cursor" aria-hidden="true"></span>
    </div>
    <a class="ticker-icon-btn" href="https://offpaper.substack.com/" target="_blank" rel="noopener noreferrer" aria-label="Subscribe on Substack">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3,6 L21,12 L3,18 L6.2,12 Z"/>
      </svg>
    </a>
  </div>

  <div class="lightbox-overlay" id="smsLightbox" role="dialog" aria-modal="true" aria-label="Text prompt sign up">
    <div class="lightbox-box">
      <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
      <!-- Blank on purpose — drop the Klaviyo SMS sign-up embed (or your own form) in here -->
      <div class="lightbox-placeholder"></div>
    </div>
  </div>

  <nav class="site-nav">
    <a href="https://sabi.london/about" class="nav-link">About</a>
    <a href="https://sabi.london/services/"class="nav-link">Services</a>
    <a href="https://play.sabi.london/word-search" class="nav-link">Play</a>
  </nav>

  <img src="sabi-logo.png" alt="SABI">

  <footer class="site-footer">
    <p class="footer-desc">A creative consultancy offering strategy and design <br class="desc-break">for culture-shaping presence and storytelling.</p>

    <div class="footer-row">
      <div class="footer-col footer-col-left">
        <div class="contact-block">
          <span class="contact-label">Contact</span>
          <a href="mailto:office@sabi.london" target="_blank" rel="noopener" class="contact-line contact-link">office@sabi.london</a>
          <a href="tel:+447400192837" class="contact-line contact-link">+44 7400 192837</a>
        </div>
      </div>

      <div class="footer-col footer-col-right">
        <div class="station" id="station">
          <div class="station-row">
            <span class="station-city">London</span>
          </div>
          <div class="station-row">
            <span class="station-time" data-time>--:--</span>
          </div>
          <div class="station-row">
            <span class="station-meta">
              <span class="station-icon" data-icon></span>
              <span data-temp>--°C</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // ── Typewriter quote reel (replaces the old scrolling ticker) ──
    const TICKER_QUOTES = [
      'No detail too casual',
      'Signed, on and off paper',
      'We saw you see it first',
      'Tuesday afternoons are cancelled',
      'The business of good impressions'
      // Add a 6th quote here as another string in the array, if needed.
    ];

    const TYPE_SPEED_MS = 83;      // per character, typing (1.5x slower than before)
    const DELETE_SPEED_MS = 45;    // per character, deleting (1.5x slower than before)
    const HOLD_MS = 5000;          // pause once fully typed
    const GAP_MS = 400;            // pause once fully deleted, before next quote

    const tickerQuoteEl = document.getElementById('tickerQuote');

    function typewriterLoop(index = 0) {
      const quote = TICKER_QUOTES[index];
      let charIndex = 0;

      function typeChar() {
        tickerQuoteEl.textContent = quote.slice(0, charIndex);
        charIndex++;
        if (charIndex <= quote.length) {
          setTimeout(typeChar, TYPE_SPEED_MS);
        } else {
          setTimeout(deleteChar, HOLD_MS);
        }
      }

      function deleteChar() {
        charIndex--;
        tickerQuoteEl.textContent = quote.slice(0, charIndex);
        if (charIndex > 0) {
          setTimeout(deleteChar, DELETE_SPEED_MS);
        } else {
          const nextIndex = (index + 1) % TICKER_QUOTES.length;
          setTimeout(() => typewriterLoop(nextIndex), GAP_MS);
        }
      }

      typeChar();
    }

    if (tickerQuoteEl && TICKER_QUOTES.length) {
      typewriterLoop(0);
    }

    // ── Lightbox (currently unused — text icon is just an image for now.
    //    Wire openLightbox() up to a trigger again whenever you're ready.) ──
    const smsLightbox = document.getElementById('smsLightbox');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox() {
      smsLightbox.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      smsLightbox.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    smsLightbox.addEventListener('click', (e) => {
      if (e.target === smsLightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && smsLightbox.classList.contains('is-open')) {
        closeLightbox();
      }
    });

    // ── Hairline weather icons, matched to Open-Meteo WMO weather codes ──
    const ICONS = {
      clear: 'clear',
      moon: 'moon',
      partlyCloudy: 'partlyCloudy',
      partlyCloudyNight: 'partlyCloudyNight',
      cloud: 'cloud',
      fog: 'fog',
      rain: 'rain',
      snow: 'snow',
      storm: 'storm'
    };

    function iconForCode(code, isDay) {
      if (code === 0) return isDay ? ICONS.clear : ICONS.moon;
      if ([1,2].includes(code)) return isDay ? ICONS.partlyCloudy : ICONS.partlyCloudyNight;
      if (code === 3) return ICONS.cloud;
      if ([45,48].includes(code)) return ICONS.fog;
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return ICONS.rain;
      if ([71,73,75,77,85,86].includes(code)) return ICONS.snow;
      if ([95,96,99].includes(code)) return ICONS.storm;
      return ICONS.cloud;
    }

    const LONDON = { lat: 51.5074, lon: -0.1278, tz: 'Europe/London' };
    const panel = document.querySelector('.station');

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-GB', {
        timeZone: LONDON.tz,
        hour: '2-digit',
        minute: '2-digit'
      });
      panel.querySelector('[data-time]').textContent = timeStr;
    }

    async function updateWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LONDON.lat}&longitude=${LONDON.lon}&current=temperature_2m,weather_code,is_day`);
        const data = await res.json();
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        const isDay = data.current.is_day === 1;
        panel.querySelector('[data-temp]').textContent = `${temp}°C`;
        const iconName = iconForCode(code, isDay);
        panel.querySelector('[data-icon]').innerHTML =
          `<img src="icons/${iconName}.png" alt="" width="256" height="256" onerror="this.style.display='none'">`;
      } catch (e) {
        panel.querySelector('[data-temp]').textContent = '—';
      } finally {
        // Now that the real temperature text is in place, size everything once,
        // then reveal the block — instead of resizing on a blind timer while it's
        // already visible (which is what caused the glitch/rearrange).
        matchStationRowWidths();
        matchLeftColumnHeightToStation();
        panel.classList.add('is-ready');
      }
    }

    updateClock();
    updateWeather();
    setInterval(updateClock, 1000);
    setInterval(updateWeather, 5 * 60 * 1000); // refresh weather every 5 min

    // ── Force all three station rows (city/time/meta) to share the exact same width ──
    function matchStationRowWidths() {
      const cityEl = document.querySelector('.station-city');
      const timeEl = document.querySelector('.station-time');
      const metaEl = document.querySelector('.station-meta');
      if (!cityEl || !timeEl || !metaEl) return;

      // Reset any previous scaling before measuring fresh
      timeEl.style.fontSize = '';
      metaEl.style.fontSize = '';

      const cityWidth = cityEl.getBoundingClientRect().width;

      const timeWidth = timeEl.getBoundingClientRect().width;
      const timeFontSize = parseFloat(getComputedStyle(timeEl).fontSize);
      if (timeWidth > 0) {
        const newTimeSize = timeFontSize * (cityWidth / timeWidth);
        timeEl.style.fontSize = newTimeSize + 'px';
      }

      const metaIcon = metaEl.querySelector('.station-icon');
      const metaTemp = metaEl.querySelector('[data-temp]');
      if (metaIcon && metaTemp) {
        const iconWidth = metaIcon.getBoundingClientRect().width;
        const gapPx = parseFloat(getComputedStyle(metaEl).gap) || 0;
        const tempWidth = metaTemp.getBoundingClientRect().width;
        const tempFontSize = parseFloat(getComputedStyle(metaTemp).fontSize) || parseFloat(getComputedStyle(metaEl).fontSize);
        const availableForText = cityWidth - iconWidth - gapPx;
        if (tempWidth > 0 && availableForText > 0) {
          const newTempSize = tempFontSize * (availableForText / tempWidth);
          metaTemp.style.fontSize = newTempSize + 'px';
        }
      }
    }

    window.addEventListener('load', matchStationRowWidths);

    // The very first measurement can run before the Typekit font
    // ('owners-text') has actually finished loading — if it measures
    // against the browser's fallback font instead, the font-size scale
    // it calculates is wrong once the real font swaps in. Re-run once
    // the real webfont is confirmed loaded to correct for that.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        matchStationRowWidths();
        matchLeftColumnHeightToStation();
      });
    }

    // Debounced instead of running on every single resize tick — rotating
    // a phone fires a burst of resize events while the viewport is still
    // mid-transition, and measuring during that burst risks writing an
    // unstable font-size value.
    let stationResizeTimer;
    function scheduleMatchStationRowWidths() {
      clearTimeout(stationResizeTimer);
      stationResizeTimer = setTimeout(matchStationRowWidths, 250);
    }
    window.addEventListener('resize', scheduleMatchStationRowWidths);

    // ── On mobile, centre the logo within the empty space between nav and footer ──
    function centreLogoInMainBlock() {
      const logo = document.querySelector('img');
      const nav = document.querySelector('.site-nav');
      const footer = document.querySelector('.site-footer');
      if (!logo || !nav || !footer) return;

      const navBottom = nav.getBoundingClientRect().bottom;
      const footerHeight = footer.getBoundingClientRect().height;
      const viewportHeight = window.innerHeight;
      const availableMid = navBottom + (viewportHeight - navBottom - footerHeight) / 2;

      logo.style.position = 'fixed';
      logo.style.left = '50%';
      logo.style.top = availableMid + 'px';
      logo.style.transform = 'translate(-50%, -50%)';
    }

    window.addEventListener('load', centreLogoInMainBlock);
    window.addEventListener('resize', centreLogoInMainBlock);
    setTimeout(centreLogoInMainBlock, 100);

    // ── Desktop only: match total height of (description + contact) to the weather block ──
    function matchLeftColumnHeightToStation() {
      const desc = document.querySelector('.footer-desc');
      const contact = document.querySelector('.footer-col-left');
      const station = document.querySelector('.station');
      if (!desc || !contact || !station) return;

      // Always clear any previously-written inline values FIRST, before the
      // desktop-only check below. Rotating a phone to landscape can push its
      // width over 760px, letting this function run and write a custom
      // gap/margin for that wide layout — then rotating back to portrait
      // (width <= 760) was hitting the early return below and leaving that
      // leftover landscape-calculated spacing permanently baked in. This is
      // the actual cause of the block appearing taller after rotating back.
      desc.style.marginBottom = '';
      station.style.gap = '';

      if (window.innerWidth <= 760) return;

      const baseMarginBottom = parseFloat(getComputedStyle(desc).marginBottom);
      const baseStationGap = parseFloat(getComputedStyle(station).gap) || 8;

      const stationHeight = station.getBoundingClientRect().height;
      const descHeight = desc.getBoundingClientRect().height;
      const contactHeight = contact.getBoundingClientRect().height;
      const leftTotal = descHeight + baseMarginBottom + contactHeight;

      const diff = leftTotal - stationHeight;

      if (diff > 0) {
        // Left column is taller — stretch the station's internal gaps to match
        const extraPerGap = diff / 2; // 2 gaps between the 3 station rows
        station.style.gap = (baseStationGap + extraPerGap) + 'px';
      } else {
        // Station is taller or equal — grow the description's margin to match
        desc.style.marginBottom = (baseMarginBottom - diff) + 'px';
      }
    }

    window.addEventListener('load', matchLeftColumnHeightToStation);

    let leftColumnResizeTimer;
    function scheduleMatchLeftColumnHeightToStation() {
      clearTimeout(leftColumnResizeTimer);
      leftColumnResizeTimer = setTimeout(matchLeftColumnHeightToStation, 250);
    }
    window.addEventListener('resize', scheduleMatchLeftColumnHeightToStation);

    // Settle delay after rotation, same reasoning as the station width matcher above.
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        matchStationRowWidths();
        matchLeftColumnHeightToStation();
      }, 300);
    });

  </script>
</body>
</html>
