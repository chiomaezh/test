<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://use.typekit.net/bwp0bbg.css">
  
  <title>SABI</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #FAFBE3;
      --text: #211D1D;
      --border: #423A3A;
      --font-body: 'owners-text', sans-serif;
      --font-mono: 'gemeli-mono', serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--text);
    }

    img {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin: 0 auto;
      display: block;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    /* ── Top navigation ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      width: 33.33vw;
      padding: 28px 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
    }

    .nav-link {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .nav-link:visited,
    .nav-link:active,
    .nav-link:hover {
      color: var(--text);
    }

    @media (max-width: 560px) {
      .site-nav {
        width: auto;
        right: 0;
        padding: 20px;
        gap: 20px;
      }
      .nav-link { font-size: 13px; letter-spacing: 1px; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Footer ── */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
      font-family: var(--font-body);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas: "desc weather" "contact weather";
      align-items: end;
    }

    .footer-desc { grid-area: desc; }
    .footer-row { grid-area: contact; display: contents; }
    .footer-col-left { grid-area: contact; }
    .footer-col-right { grid-area: weather; }

    .footer-col {
      display: flex;
      flex-direction: column;
    }

    .footer-col-left {
      align-items: flex-start;
      transform: scale(0.9);
      transform-origin: bottom left;
    }

    .footer-col-right {
      align-items: flex-end;
      transform: scale(0.9);
      transform-origin: bottom right;
    }

    /* ── World clock / weather block ──
         Built as a 1-column table with invisible borders (same strategy
         used on the About page) so the block's height comes purely from
         its own rows/spacers, not from stretching to fill a parent whose
         height can shift slightly when the phone rotates. ── */
    .station {
      border-collapse: collapse;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .station.is-ready {
      opacity: 1;
    }

    .station td {
      padding: 0;
      border: 1px solid transparent;
      text-align: right;
    }

    .station-spacer td {
      height: 8px;
      line-height: 0;
      font-size: 0;
    }

    .station-city {
      font-family: var(--font-body);
      font-size: 20px;
      line-height: 1;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #000000;
      font-weight: 400;
      white-space: nowrap;
    }

    .station-time {
      font-family: var(--font-body);
      font-size: 38px;
      letter-spacing: 1px;
      color: #000000;
      font-weight: 400;
      white-space: nowrap;
    }

    .station-meta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-body);
      font-size: 30px;
      letter-spacing: 1px;
      color: #000000;
      white-space: nowrap;
    }

    .station-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .station-icon svg {
      width: 100%;
      height: 100%;
      stroke: #000000;
      fill: none;
      stroke-width: 1.3;
    }

    /* ── Description block ── */
  .footer-desc {
  max-width: 420px;
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 400;
  line-height: 1.15;
  color: var(--text);
  text-align: left;
  margin: 0 0 14px 0;
}

/* ── Contact block ── */
.contact-block {
  display: flex;
  flex-direction: column;
  gap: 11px;
  text-align: left;
}

    .contact-label {
      font-family: var(--font-body);
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 400;
    }

    .contact-line {
      font-family: var(--font-body);
      font-size: 16px;
      color: #000000;
      font-weight: 300;
    }

    .contact-link {
      color: #000000 !important;
      text-decoration: underline;
    }
    .contact-link:visited,
    .contact-link:active,
    .contact-link:hover {
      color: #000000 !important;
    }

    @media (max-width: 760px) {
      img { max-width: 165px; }
      .site-footer {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: "desc desc" "contact weather";
        align-items: start;
        gap: 40px 12px;
        padding: 20px;
      }
      .footer-row { display: contents; }
      .footer-col-left {
        align-items: flex-start;
        transform: none;
        align-self: stretch;
      }
      .footer-col-right {
        align-items: flex-end;
        transform: none;
        align-self: stretch;
      }
      .contact-block {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .footer-desc { text-align: center; font-size: 15px; max-width: none; margin: 0 0 4px 0; justify-self: center; }
      .contact-block { text-align: left; }
      .station-city { font-size: 15px; letter-spacing: 2px; }
      .station-time { font-size: 28px; }
      .station-meta { font-size: 22px; }
      .station-icon { width: 22px; height: 22px; }
    }

    /* ── Phone landscape (short viewport): keep the compact single-row
         footer instead of the tall stacked portrait layout. Capped at
         max-height so tablets in landscape (which have plenty of room)
         keep the normal desktop-style footer untouched. ── */
    @media (orientation: landscape) and (max-height: 500px) {
      img { max-width: 110px; }

      .site-nav { padding: 14px 20px; }

      .site-footer {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: "desc weather" "contact weather";
        align-items: end;
        gap: 0;
        padding: 14px 24px;
      }

      .footer-row { display: contents; }
      .footer-col-left {
        grid-area: contact;
        align-items: flex-start;
        transform: none;
        align-self: end;
      }
      .footer-col-right {
        grid-area: weather;
        align-items: flex-end;
        transform: none;
        align-self: end;
      }

      .footer-desc {
        text-align: left;
        font-size: 12px;
        line-height: 1.15;
        max-width: 280px;
        margin: 0 0 16px 0;
        justify-self: start;
      }

      .contact-block { gap: 4px; text-align: left; }
      .contact-label { font-size: 10px; letter-spacing: 1.5px; }
      .contact-line { font-size: 11px; }

      .station-spacer td { height: 3px; }
      .station-city { font-size: 11px; letter-spacing: 1.5px; }
      .station-time { font-size: 18px; }
      .station-meta { font-size: 14px; gap: 4px; }
      .station-icon { width: 14px; height: 14px; }
    }
  </style>

</head>
<body>
  <nav class="site-nav">
    <a href="https://sabi.london/about" class="nav-link">About</a>
    <a href="https://sabi.london/services/"class="nav-link">Services</a>
    <a href="https://play.sabi.london/word-search" class="nav-link">Play</a>
  </nav>

  <img src="sabi-logo.png" alt="SABI">

  <footer class="site-footer">
    <p class="footer-desc">A creative consultancy offering strategy and design <br class="desc-break">for culture-shaping presence and storytelling.</p>

    <div class="footer-row">
      <div class="footer-col footer-col-left">
        <div class="contact-block">
          <span class="contact-label">Contact</span>
          <a href="mailto:office@sabi.london" target="_blank" rel="noopener" class="contact-line contact-link">office@sabi.london</a>
          <a href="tel:+447400192837" class="contact-line contact-link">+44 7400 192837</a>
        </div>
      </div>

      <div class="footer-col footer-col-right">
        <table class="station" id="station" cellpadding="0" cellspacing="0">
          <tbody>
            <tr>
              <td><span class="station-city">London</span></td>
            </tr>
            <tr class="station-spacer">
              <td></td>
            </tr>
            <tr>
              <td><span class="station-time" data-time>--:--</span></td>
            </tr>
            <tr class="station-spacer">
              <td></td>
            </tr>
            <tr>
              <td>
                <span class="station-meta">
                  <span class="station-icon" data-icon></span>
                  <span data-temp>--°C</span>
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </footer>

  <script>
    // ── Hairline weather icons, matched to Open-Meteo WMO weather codes ──
    const ICONS = {
      clear: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>',
      moon: '<svg viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z"/></svg>',
      partlyCloudy: '<svg viewBox="0 0 24 24"><circle cx="16" cy="6" r="3.5"/><line x1="16" y1="1" x2="16" y2="2.5"/><line x1="16" y1="9.5" x2="16" y2="11"/><line x1="11" y1="6" x2="12.5" y2="6"/><line x1="19.5" y1="6" x2="21" y2="6"/><line x1="12.5" y1="2.5" x2="13.6" y2="3.6"/><line x1="18.4" y1="8.4" x2="19.5" y2="9.5"/><line x1="19.5" y1="2.5" x2="18.4" y2="3.6"/><path d="M5 19a3.5 3.5 0 1 1 .6-6.95A4.8 4.8 0 0 1 15 14h.5a3 3 0 0 1 0 6H5z"/></svg>',
      partlyCloudyNight: '<svg viewBox="0 0 24 24"><path d="M18.3 3.3a4.6 4.6 0 1 0 3 6.9 3.7 3.7 0 0 1-3-6.9z"/><path fill="var(--bg)" d="M5 19a3.5 3.5 0 1 1 .6-6.95A4.8 4.8 0 0 1 15 14h.5a3 3 0 0 1 0 6H5z"/></svg>',
      cloud: '<svg viewBox="0 0 24 24"><path d="M6 18a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 12H18a3.5 3.5 0 0 1 0 7H6z"/></svg>',
      fog: '<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="9" y2="18"/><line x1="7" y1="6" x2="13" y2="18"/><line x1="11" y1="6" x2="17" y2="18"/><line x1="15" y1="6" x2="21" y2="18"/></svg>',
      rain: '<svg viewBox="0 0 24 24"><path d="M6 14a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 8H18a3.5 3.5 0 0 1 0 7H6z"/><line x1="7" y1="18" x2="9.5" y2="24" stroke-dasharray="2 1.5"/><line x1="12" y1="18" x2="14.5" y2="24" stroke-dasharray="2 1.5"/><line x1="17" y1="18" x2="19.5" y2="24" stroke-dasharray="2 1.5"/></svg>',
      snow: '<svg viewBox="0 0 24 24"><line x1="12" y1="4" x2="12" y2="14"/><line x1="7.1" y1="6.5" x2="16.9" y2="11.5"/><line x1="16.9" y1="6.5" x2="7.1" y2="11.5"/><line x1="5" y1="14" x2="5" y2="20"/><line x1="2.3" y1="15.5" x2="7.7" y2="18.5"/><line x1="7.7" y1="15.5" x2="2.3" y2="18.5"/><line x1="19" y1="15" x2="19" y2="19"/><line x1="17" y1="16" x2="21" y2="18"/><line x1="21" y1="16" x2="17" y2="18"/></svg>',
      storm: '<svg viewBox="0 0 24 24"><path d="M6 13a4 4 0 1 1 .7-7.94A5.5 5.5 0 0 1 17.5 7H18a3.5 3.5 0 0 1 0 7H6z"/><polyline points="11 16 9 20 12 20 10 24"/></svg>'
    };

    function iconForCode(code, isDay) {
      if (code === 0) return isDay ? ICONS.clear : ICONS.moon;
      if ([1,2].includes(code)) return isDay ? ICONS.partlyCloudy : ICONS.partlyCloudyNight;
      if (code === 3) return ICONS.cloud;
      if ([45,48].includes(code)) return ICONS.fog;
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return ICONS.rain;
      if ([71,73,75,77,85,86].includes(code)) return ICONS.snow;
      if ([95,96,99].includes(code)) return ICONS.storm;
      return ICONS.cloud;
    }

    const LONDON = { lat: 51.5074, lon: -0.1278, tz: 'Europe/London' };
    const panel = document.querySelector('.station');

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-GB', {
        timeZone: LONDON.tz,
        hour: '2-digit',
        minute: '2-digit'
      });
      panel.querySelector('[data-time]').textContent = timeStr;
    }

    async function updateWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LONDON.lat}&longitude=${LONDON.lon}&current=temperature_2m,weather_code,is_day`);
        const data = await res.json();
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        const isDay = data.current.is_day === 1;
        panel.querySelector('[data-temp]').textContent = `${temp}°C`;
        panel.querySelector('[data-icon]').innerHTML = iconForCode(code, isDay);
      } catch (e) {
        panel.querySelector('[data-temp]').textContent = '—';
      } finally {
        // Now that the real temperature text is in place, size everything once,
        // then reveal the block — instead of resizing on a blind timer while it's
        // already visible (which is what caused the glitch/rearrange).
        matchStationRowWidths();
        matchLeftColumnHeightToStation();
        panel.classList.add('is-ready');
      }
    }

    updateClock();
    updateWeather();
    setInterval(updateClock, 1000);
    setInterval(updateWeather, 15 * 60 * 1000); // refresh weather every 15 min

    // ── Force all three station rows (city/time/meta) to share the exact same width ──
    function matchStationRowWidths() {
      const cityEl = document.querySelector('.station-city');
      const timeEl = document.querySelector('.station-time');
      const metaEl = document.querySelector('.station-meta');
      if (!cityEl || !timeEl || !metaEl) return;

      // Reset any previous scaling before measuring fresh
      timeEl.style.fontSize = '';
      metaEl.style.fontSize = '';

      const cityWidth = cityEl.getBoundingClientRect().width;

      const timeWidth = timeEl.getBoundingClientRect().width;
      const timeFontSize = parseFloat(getComputedStyle(timeEl).fontSize);
      if (timeWidth > 0) {
        const newTimeSize = timeFontSize * (cityWidth / timeWidth);
        timeEl.style.fontSize = newTimeSize + 'px';
      }

      const metaIcon = metaEl.querySelector('.station-icon');
      const metaTemp = metaEl.querySelector('[data-temp]');
      if (metaIcon && metaTemp) {
        const iconWidth = metaIcon.getBoundingClientRect().width;
        const gapPx = parseFloat(getComputedStyle(metaEl).gap) || 0;
        const tempWidth = metaTemp.getBoundingClientRect().width;
        const tempFontSize = parseFloat(getComputedStyle(metaTemp).fontSize) || parseFloat(getComputedStyle(metaEl).fontSize);
        const availableForText = cityWidth - iconWidth - gapPx;
        if (tempWidth > 0 && availableForText > 0) {
          const newTempSize = tempFontSize * (availableForText / tempWidth);
          metaTemp.style.fontSize = newTempSize + 'px';
        }
      }
    }

    window.addEventListener('load', matchStationRowWidths);
    window.addEventListener('resize', matchStationRowWidths);

    // ── On mobile, centre the logo within the empty space between nav and footer ──
    function centreLogoInMainBlock() {
      const logo = document.querySelector('img');
      const nav = document.querySelector('.site-nav');
      const footer = document.querySelector('.site-footer');
      if (!logo || !nav || !footer) return;

      const navHeight = nav.getBoundingClientRect().height;
      const footerHeight = footer.getBoundingClientRect().height;
      const viewportHeight = window.innerHeight;
      const availableMid = navHeight + (viewportHeight - navHeight - footerHeight) / 2;

      logo.style.position = 'fixed';
      logo.style.left = '50%';
      logo.style.top = availableMid + 'px';
      logo.style.transform = 'translate(-50%, -50%)';
    }

    window.addEventListener('load', centreLogoInMainBlock);
    window.addEventListener('resize', centreLogoInMainBlock);
    setTimeout(centreLogoInMainBlock, 100);

    // ── Match total height of (description + contact) to the weather table,
    //    by growing/shrinking the two invisible spacer rows (or the
    //    description's margin). Runs at all widths now — mobile used to
    //    rely on CSS height:100%/space-between for this, which is exactly
    //    what caused the block to resize on rotation, so that's been
    //    replaced with this JS-driven measurement.
    //
    //    NOTE: .footer-col-left/.footer-col-right both have transform:
    //    scale(0.9) — .footer-desc does NOT. getBoundingClientRect() always
    //    returns visual (post-scale) size, so a pixel adjustment made to the
    //    (scaled) spacer rows needs dividing by 0.9 to land correctly, while
    //    an adjustment to the (unscaled) description margin doesn't.
    //
    //    This is solved iteratively rather than in one shot, because the
    //    weather column spans two grid rows on desktop/landscape, and the
    //    browser's own grid track-sizing already redistributes some extra
    //    height across those rows to fit it — a closed-form calculation
    //    can't predict that, but a few rounds of "measure, nudge, remeasure"
    //    converges on the right answer regardless. ──
    function matchLeftColumnHeightToStation() {
      const SCALE = 0.9;
      const desc = document.querySelector('.footer-desc');
      const contact = document.querySelector('.footer-col-left');
      const station = document.querySelector('.station');
      const spacers = document.querySelectorAll('.station-spacer td');
      if (!desc || !contact || !station || spacers.length < 2) return;

      // Reset both to CSS-defined base values before measuring/bailing
      desc.style.marginBottom = '';
      spacers.forEach(td => { td.style.height = ''; });

      const baseSpacerHeight = parseFloat(getComputedStyle(spacers[0]).height) || 8;
      const baseMarginBottom = parseFloat(getComputedStyle(desc).marginBottom);

      // This match only makes sense on the layouts where the weather table
      // sits beside BOTH the description and the contact block combined
      // (desktop, and phone landscape — grid-template-areas "desc weather"
      // "contact weather", i.e. weather spans both rows). On phone portrait
      // the grid becomes "desc desc" / "contact weather", so weather only
      // sits next to the contact block — so there it should match against
      // the contact block alone, not desc+contact combined.
      const isLandscapeShort = window.matchMedia('(orientation: landscape) and (max-height: 500px)').matches;
      const isPortraitMobile = window.innerWidth <= 760 && !isLandscapeShort;

      const MAX_ITERATIONS = 6;
      const TOLERANCE = 0.5; // px

      if (isPortraitMobile) {
        let extra = 0;
        for (let i = 0; i < MAX_ITERATIONS; i++) {
          const stationHeight = station.getBoundingClientRect().height;
          const contactHeight = contact.getBoundingClientRect().height;
          const diffVisual = contactHeight - stationHeight;
          if (diffVisual <= TOLERANCE) break;
          extra += diffVisual / SCALE;
          const perSpacer = extra / 2;
          spacers.forEach(td => { td.style.height = (baseSpacerHeight + perSpacer) + 'px'; });
        }
        return;
      }

      // Desktop / landscape: decide once which side needs to grow (based on
      // the first measurement), then only ever adjust that one side while
      // iterating, so the two mechanisms can't fight each other.
      const firstLeftTotal = desc.getBoundingClientRect().height + baseMarginBottom + contact.getBoundingClientRect().height;
      const firstDiff = firstLeftTotal - station.getBoundingClientRect().height;

      if (firstDiff > 0) {
        let extra = 0;
        for (let i = 0; i < MAX_ITERATIONS; i++) {
          const stationHeight = station.getBoundingClientRect().height;
          const leftTotal = desc.getBoundingClientRect().height + baseMarginBottom + contact.getBoundingClientRect().height;
          const diffVisual = leftTotal - stationHeight;
          if (diffVisual <= TOLERANCE) break;
          extra += diffVisual / SCALE;
          const perSpacer = extra / 2;
          spacers.forEach(td => { td.style.height = (baseSpacerHeight + perSpacer) + 'px'; });
        }
      } else {
        let extraMargin = 0;
        for (let i = 0; i < MAX_ITERATIONS; i++) {
          const stationHeight = station.getBoundingClientRect().height;
          const leftTotal = desc.getBoundingClientRect().height + (baseMarginBottom + extraMargin) + contact.getBoundingClientRect().height;
          const diffVisual = stationHeight - leftTotal;
          if (diffVisual <= TOLERANCE) break;
          extraMargin += diffVisual; // .footer-desc is unscaled — 1:1 px
          desc.style.marginBottom = (baseMarginBottom + extraMargin) + 'px';
        }
      }
    }

    window.addEventListener('load', matchLeftColumnHeightToStation);
    window.addEventListener('resize', matchLeftColumnHeightToStation);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        matchStationRowWidths();
        matchLeftColumnHeightToStation();
      });
    }

  </script>
</body>
